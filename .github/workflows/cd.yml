# =============================================================================
# CSN - Continuous Deployment Pipeline
# =============================================================================
name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/api
  WEB_IMAGE: ghcr.io/${{ github.repository }}/web
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Build and push Docker images
  # ---------------------------------------------------------------------------
  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      api-image-tag: ${{ steps.meta-api.outputs.version }}
      web-image-tag: ${{ steps.meta-web.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract API image metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract Web image metadata
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Run database migrations
  # ---------------------------------------------------------------------------
  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: [build-images]
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4

      - name: Set Kubernetes context
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Run migration Job
        run: |
          # Generate a unique job name with timestamp
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          JOB_NAME="csn-migration-${TIMESTAMP}"

          # Apply the migration job with updated image and name
          sed -e "s|name: csn-migration|name: ${JOB_NAME}|" \
              -e "s|ghcr.io/csn/api:latest|${{ env.API_IMAGE }}:${{ github.sha }}|" \
              k8s/jobs/migration.yaml | kubectl apply -f -

          # Wait for the job to complete
          echo "Waiting for migration job to complete..."
          kubectl wait --for=condition=complete job/${JOB_NAME} \
            -n csn --timeout=300s

          # Show migration logs
          kubectl logs job/${JOB_NAME} -n csn

  # ---------------------------------------------------------------------------
  # Deploy to Kubernetes
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-images, migrate]
    environment:
      name: production
      url: https://csn.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4

      - name: Set Kubernetes context
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Update API deployment image
        run: |
          kubectl set image deployment/csn-api \
            api=${{ env.API_IMAGE }}:${{ github.sha }} \
            -n csn

      - name: Update Web deployment image
        run: |
          kubectl set image deployment/csn-web \
            web=${{ env.WEB_IMAGE }}:${{ github.sha }} \
            -n csn

      - name: Wait for API rollout
        run: |
          kubectl rollout status deployment/csn-api -n csn --timeout=300s

      - name: Wait for Web rollout
        run: |
          kubectl rollout status deployment/csn-web -n csn --timeout=300s

      - name: Verify deployment health
        run: |
          echo "Checking API pod status..."
          kubectl get pods -n csn -l app=csn-api
          echo ""
          echo "Checking Web pod status..."
          kubectl get pods -n csn -l app=csn-web
          echo ""
          echo "Deployment complete."
