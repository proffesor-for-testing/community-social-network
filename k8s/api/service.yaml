# =============================================================================
# CSN API - Kubernetes Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: csn-api
  namespace: csn
  labels:
    app: csn-api
    component: backend
spec:
  type: ClusterIP
  selector:
    app: csn-api
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
