# =============================================================================
# CSN PostgreSQL - Headless Service (for StatefulSet)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: csn-postgres
  namespace: csn
  labels:
    app: csn-postgres
    component: database
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: csn-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
