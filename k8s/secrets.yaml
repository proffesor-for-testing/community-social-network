# =============================================================================
# CSN - Secret Template
# =============================================================================
# IMPORTANT: Replace base64 placeholder values before applying.
# Generate base64 values: echo -n "your-secret" | base64
#
# In production, use a secret management solution:
#   - Sealed Secrets (Bitnami)
#   - External Secrets Operator
#   - HashiCorp Vault
#   - AWS Secrets Manager
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: csn-secrets
  namespace: csn
  labels:
    app: csn
    part-of: community-social-network
type: Opaque
data:
  # Database credentials
  # echo -n "postgres" | base64 = cG9zdGdyZXM=
  DB_USERNAME: cG9zdGdyZXM=
  DB_PASSWORD: REPLACE_WITH_BASE64_ENCODED_PASSWORD

  # Redis password (if authentication is enabled)
  REDIS_PASSWORD: ""

  # JWT secrets (generate strong random values for production)
  # node -e "console.log(require('crypto').randomBytes(64).toString('hex'))" | base64
  JWT_SECRET: REPLACE_WITH_BASE64_ENCODED_JWT_SECRET
  JWT_REFRESH_SECRET: REPLACE_WITH_BASE64_ENCODED_JWT_REFRESH_SECRET

  # S3 credentials
  S3_ACCESS_KEY: REPLACE_WITH_BASE64_ENCODED_ACCESS_KEY
  S3_SECRET_KEY: REPLACE_WITH_BASE64_ENCODED_SECRET_KEY

  # SMTP credentials
  SMTP_USER: REPLACE_WITH_BASE64_ENCODED_SMTP_USER
  SMTP_PASS: REPLACE_WITH_BASE64_ENCODED_SMTP_PASS
